app = "vclip-api"
primary_region = "sin"

[build]
  dockerfile = "backend/Dockerfile.fly"

[env]
  VCLIP_HOST = "0.0.0.0"
  VCLIP_PORT = "8080"
  VCLIP_WHISPER_MODEL = "tiny"
  VCLIP_WHISPER_DEVICE = "cpu"
  VCLIP_WHISPER_COMPUTE = "int8"
  VCLIP_DEBUG = "false"
  MAX_CONCURRENT_JOBS = "1"
  VCLIP_WATERMARK = "true"
  VCLIP_WATERMARK_TEXT = "Made with VClip"
  VCLIP_FREE_CLIPS_DAY = "3"

[http_service]
  internal_port = 8080
  force_https = true
  auto_stop_machines = "stop"
  auto_start_machines = true
  min_machines_running = 0

  [http_service.concurrency]
    type = "requests"
    hard_limit = 25
    soft_limit = 20

[[vm]]
  memory = "1gb"
  cpu_kind = "shared"
  cpus = 1
